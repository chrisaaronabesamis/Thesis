<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
</head>
<body>
    <h1>Testing YouTube API Connection</h1>
    <button onclick="testAPI()">Test API</button>
    <div id="result"></div>

    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing...';
            
            try {
                const response = await fetch('http://localhost:4000/v1/youtube/banner/videos');
                const data = await response.json();
                
                if (data.success) {
                    resultDiv.innerHTML = `
                        <h3>✅ API Working!</h3>
                        <p>Found ${data.data.length} videos</p>
                        <ul>
                            ${data.data.map(video => `<li>${video.title}</li>`).join('')}
                        </ul>
                    `;
                } else {
                    resultDiv.innerHTML = `<h3>❌ API Error: ${data.message}</h3>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<h3>❌ Connection Error: ${error.message}</h3>`;
            }
        }
    </script>
</body>
</html>
